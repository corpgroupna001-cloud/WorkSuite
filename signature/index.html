<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Signature Studio</title><link rel="stylesheet" href="../assets/styles.css"></head><body><nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">✍</span><span>Signature Studio</span></a><div class="links"><a href="../">Home</a><a href="../typingtest/">Typing</a></div></div></nav><main class="wrap section"><section class="panel tool"><h1 class="title">Professional email signature generator</h1><div class="formgrid"><label>Name<input id="name" value="Your Name"></label><label>Role<input id="role" value="Business Development Executive"></label><label>Company<select id="company"><option>Jobways Point LLP</option><option>Nova Sportsmart Private Limited</option><option>Protathlitis Sportsmart LLP</option><option>Navyug Raise A Player Foundation</option><option>GenieLamp Private Limited</option></select></label><label>Brand colour<input id="color" type="color" value="#7c5cff"></label><label>Email<input id="email" value="name@example.com"></label><label>Phone<input id="phone" value="+91 00000 00000"></label><label>Website<input id="web" value="https://example.com"></label><label>LinkedIn<input id="linkedin" value="https://linkedin.com/in/yourname"></label></div><div class="toolbar"><button class="btn primary" id="copy">Copy Outlook Signature</button><button class="btn" id="download">Download HTML</button></div><h2>Signature Preview</h2><div class="canvas" id="preview"></div></section></main><script>const q=s=>document.querySelector(s),ids=['name','role','company','color','email','phone','web','linkedin'];function html(){let c=q('#color').value;return `<table style="font-family:Arial,sans-serif;color:#111;line-height:1.35"><tr><td style="width:8px;background:${c};border-radius:8px"></td><td style="padding-left:16px"><div style="font-size:20px;font-weight:800;color:${c}">${q('#name').value}</div><div style="font-size:14px;color:#333">${q('#role').value}</div><div style="font-size:14px;font-weight:700;margin-top:6px">${q('#company').value}</div><div style="font-size:13px;margin-top:8px">📧 ${q('#email').value} · ☎ ${q('#phone').value}</div><div style="font-size:13px">🌐 ${q('#web').value} · 🔗 ${q('#linkedin').value}</div></td></tr></table>`}function render(){q('#preview').innerHTML=html()}ids.forEach(id=>q('#'+id).oninput=render);q('#copy').onclick=async()=>{await navigator.clipboard.write([new ClipboardItem({'text/html':new Blob([html()],{type:'text/html'}),'text/plain':new Blob([q('#preview').innerText],{type:'text/plain'})})]);q('#copy').textContent='Copied!'};q('#download').onclick=()=>{let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html()],{type:'text/html'}));a.download='email-signature.html';a.click()};render();</script></body></html>
