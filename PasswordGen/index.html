<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Password Generator — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">🔐</span><span>PasswordGen</span></a><div class="links"><a href="../">Home</a><button class="btn sm ghost" onclick="_openCmd()" style="font-family:var(--mono)">⌘K</button><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav>
<main class="wrap section"><section class="panel tool-page">
  <h1 class="section-title">Password generator</h1>
  <p class="section-sub mb">Cryptographically random. Nothing leaves your browser.</p>
  <div class="output-box" id="output" style="font-size:22px;text-align:center;letter-spacing:1.5px;min-height:60px;display:grid;place-items:center;cursor:pointer;font-family:var(--mono)" title="Click to copy"></div>
  <div class="strength-bar mt"><div class="strength-fill" id="bar"></div></div>
  <p style="font-size:12px;color:var(--text-tertiary);margin-top:4px" id="strengthLabel">Generate a password</p>
  <div class="two mt">
    <div>
      <label>Length: <b id="lenLabel">16</b><input type="range" id="length" min="4" max="64" value="16" style="border:none;padding:4px 0"></label>
      <label class="mt" style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="upper" checked style="width:auto"> Uppercase A-Z</label>
      <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="lower" checked style="width:auto"> Lowercase a-z</label>
      <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="digits" checked style="width:auto"> Digits 0-9</label>
      <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="symbols" checked style="width:auto"> Symbols !@#$...</label>
      <label style="display:flex;align-items:center;gap:6px"><input type="checkbox" id="noAmb" style="width:auto"> Exclude ambiguous 0Ol1I</label>
    </div>
    <div>
      <div class="toolbar"><button class="btn primary" id="gen">Generate</button><button class="btn" id="copy">Copy</button></div>
      <div class="toolbar mt"><button class="btn sm" id="pin">4-digit PIN</button><button class="btn sm" id="phrase">Passphrase</button></div>
      <h3 style="font-size:14px;margin-top:16px">Recent</h3>
      <div id="history" style="max-height:180px;overflow:auto"></div>
      <button class="btn sm mt" id="clearH">Clear</button>
    </div>
  </div>
</section></main>
<script>
const $=s=>document.querySelector(s);
const U='ABCDEFGHIJKLMNOPQRSTUVWXYZ',L='abcdefghijklmnopqrstuvwxyz',D='0123456789',S='!@#$%^&*()_+-=[]{}|;:,.<>?',AMB='0Ol1I';
let hist=JSON.parse(localStorage.pwHist||'[]');
function cs(){let c='';if($('#upper').checked)c+=U;if($('#lower').checked)c+=L;if($('#digits').checked)c+=D;if($('#symbols').checked)c+=S;if($('#noAmb').checked)c=[...c].filter(ch=>!AMB.includes(ch)).join('');return c||L}
function gen(){const ch=cs(),len=+$('#length').value,arr=new Uint32Array(len);crypto.getRandomValues(arr);return[...arr].map(n=>ch[n%ch.length]).join('')}
function strength(pw){let s=0;if(pw.length>=8)s++;if(pw.length>=12)s++;if(pw.length>=20)s++;if(/[a-z]/.test(pw)&&/[A-Z]/.test(pw))s++;if(/\d/.test(pw))s++;if(/[^a-zA-Z0-9]/.test(pw))s++;const l=['Weak','Fair','Good','Strong','Very strong'],c=['#ef4444','#f59e0b','#eab308','#10b981','#6246ea'],i=Math.min(s,4);return{label:l[i],color:c[i],pct:Math.min(100,(i+1)*25)}}
function show(pw){$('#output').textContent=pw;const s=strength(pw);$('#bar').style.width=s.pct+'%';$('#bar').style.background=s.color;$('#strengthLabel').textContent=s.label+' — '+pw.length+' characters';hist.unshift(pw);hist=hist.slice(0,15);localStorage.pwHist=JSON.stringify(hist);renderH()}
function renderH(){$('#history').innerHTML=hist.map((p,i)=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:12px;font-family:var(--mono);cursor:pointer;word-break:break-all;color:var(--text-secondary)" data-i="${i}">${p.slice(0,36)}${p.length>36?'…':''}</div>`).join('')||'<p style="color:var(--text-tertiary);font-size:13px">None yet</p>';document.querySelectorAll('#history [data-i]').forEach(el=>el.onclick=()=>WorkSuite.copyText(hist[+el.dataset.i]))}
function passphrase(){const w=['correct','horse','battery','staple','quantum','bridge','forest','prism','marble','copper','signal','velvet','anchor','breeze','summit','flicker','golden','silver','shadow','crystal'];const a=new Uint32Array(4);crypto.getRandomValues(a);return[...a].map(n=>w[n%w.length]).join('-')}
$('#length').oninput=()=>$('#lenLabel').textContent=$('#length').value;
$('#gen').onclick=()=>show(gen());$('#copy').onclick=()=>WorkSuite.copyText($('#output').textContent);$('#output').onclick=()=>{if($('#output').textContent)WorkSuite.copyText($('#output').textContent)};$('#pin').onclick=()=>{const a=new Uint32Array(4);crypto.getRandomValues(a);show([...a].map(n=>n%10).join(''))};$('#phrase').onclick=()=>show(passphrase());$('#clearH').onclick=()=>{hist=[];localStorage.removeItem('pwHist');renderH();WorkSuite.toast('Cleared')};
show(gen());
</script>
</body></html>
