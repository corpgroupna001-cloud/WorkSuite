<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Password Generator — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin">
  <a class="logo" href="../"><span class="mark">🔐</span><span>Password Gen</span></a>
  <div class="links"><a href="../">Home</a><a href="../QRStudio/">QR Studio</a>
    <button class="theme-toggle" data-theme-toggle>🌙</button>
  </div>
</div></nav>

<main class="wrap section">
  <section class="panel tool">
    <h1 class="title">Password generator</h1>
    <p class="muted mb">Generate cryptographically random passwords. Nothing leaves your browser.</p>

    <div class="output-box" id="output" style="font-size:22px;text-align:center;letter-spacing:2px;min-height:64px;display:grid;place-items:center;cursor:pointer" title="Click to copy"></div>
    <div class="strength-bar mt"><div class="strength-bar-fill" id="bar"></div></div>
    <p class="mini mt" id="strengthLabel">Generate a password to see strength</p>

    <div class="two mt">
      <div>
        <label>Length: <b id="lenLabel">16</b>
          <input type="range" id="length" min="4" max="64" value="16" style="border:none;padding:0">
        </label>
        <label class="mt"><input type="checkbox" id="upper" checked> Uppercase (A-Z)</label>
        <label><input type="checkbox" id="lower" checked> Lowercase (a-z)</label>
        <label><input type="checkbox" id="digits" checked> Digits (0-9)</label>
        <label><input type="checkbox" id="symbols" checked> Symbols (!@#$...)</label>
        <label><input type="checkbox" id="noAmbiguous"> Exclude ambiguous (0Ol1I)</label>
      </div>
      <div>
        <div class="toolbar">
          <button class="btn primary" id="gen">Generate</button>
          <button class="btn" id="copy">Copy</button>
        </div>
        <div class="toolbar mt">
          <button class="btn" id="genPin">4-digit PIN</button>
          <button class="btn" id="genPass">Passphrase</button>
        </div>
        <h3 class="mt">Recent passwords</h3>
        <div id="history" style="max-height:200px;overflow:auto"></div>
        <button class="btn mt" id="clearHist">Clear history</button>
      </div>
    </div>
  </section>
</main>

<script>
const $=s=>document.querySelector(s);
const UPPER='ABCDEFGHIJKLMNOPQRSTUVWXYZ',LOWER='abcdefghijklmnopqrstuvwxyz',DIGITS='0123456789',SYMBOLS='!@#$%^&*()_+-=[]{}|;:,.<>?';
const AMBIG='0Ol1I';
let hist=JSON.parse(localStorage.pwHist||'[]');

function charset(){
  let c='';
  if($('#upper').checked)c+=UPPER;
  if($('#lower').checked)c+=LOWER;
  if($('#digits').checked)c+=DIGITS;
  if($('#symbols').checked)c+=SYMBOLS;
  if($('#noAmbiguous').checked) c=[...c].filter(ch=>!AMBIG.includes(ch)).join('');
  return c||LOWER;
}

function generate(){
  const cs=charset(),len=+$('#length').value;
  const arr=new Uint32Array(len);
  crypto.getRandomValues(arr);
  return [...arr].map(n=>cs[n%cs.length]).join('');
}

function strength(pw){
  let score=0;
  if(pw.length>=8)score++;if(pw.length>=12)score++;if(pw.length>=20)score++;
  if(/[a-z]/.test(pw)&&/[A-Z]/.test(pw))score++;
  if(/\d/.test(pw))score++;
  if(/[^a-zA-Z0-9]/.test(pw))score++;
  const labels=['Weak','Fair','Good','Strong','Very strong'];
  const colors=['#ef4444','#f59e0b','#eab308','#10b981','#6c47ff'];
  const i=Math.min(score,4);
  return{label:labels[i],color:colors[i],pct:Math.min(100,(i+1)*25)};
}

function show(pw){
  $('#output').textContent=pw;
  const s=strength(pw);
  $('#bar').style.width=s.pct+'%';
  $('#bar').style.background=s.color;
  $('#strengthLabel').textContent=s.label+' — '+pw.length+' characters';
  hist.unshift(pw);hist=hist.slice(0,20);
  localStorage.pwHist=JSON.stringify(hist);
  renderHist();
}

function renderHist(){
  $('#history').innerHTML=hist.map((p,i)=>`<div class="mini" style="padding:6px 0;border-bottom:1px solid var(--border);cursor:pointer;word-break:break-all" data-i="${i}">${p.slice(0,40)}${p.length>40?'…':''}</div>`).join('')||'<p class="muted">No passwords generated yet.</p>';
  document.querySelectorAll('#history [data-i]').forEach(el=>el.onclick=()=>WorkSuite.copyText(hist[+el.dataset.i]));
}

function passphrase(){
  const words=['correct','horse','battery','staple','quantum','bridge','forest','prism','marble','copper','signal','velvet','anchor','breeze','summit','flicker','golden','silver','shadow','crystal'];
  const arr=new Uint32Array(4);crypto.getRandomValues(arr);
  return [...arr].map(n=>words[n%words.length]).join('-');
}

$('#length').oninput=()=>$('#lenLabel').textContent=$('#length').value;
$('#gen').onclick=()=>show(generate());
$('#copy').onclick=()=>WorkSuite.copyText($('#output').textContent);
$('#output').onclick=()=>{if($('#output').textContent)WorkSuite.copyText($('#output').textContent)};
$('#genPin').onclick=()=>{const a=new Uint32Array(4);crypto.getRandomValues(a);show([...a].map(n=>n%10).join(''))};
$('#genPass').onclick=()=>show(passphrase());
$('#clearHist').onclick=()=>{hist=[];localStorage.removeItem('pwHist');renderHist();WorkSuite.toast('History cleared')};

show(generate());
</script>
</body>
</html>
