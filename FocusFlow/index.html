<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>FocusFlow — Pomodoro Timer</title><link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script></head><body><nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">⏱</span><span>FocusFlow</span></a><div class="links"><a href="../">Home</a><a href="../QRStudio/">QR Studio</a><a href="../typingtest/">ZenType</a><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav><main class="wrap section"><section class="panel tool"><span class="eyebrow">25 / 5 / 15 Pomodoro cycles</span><h1 class="title">Deep work, clean breaks.</h1><div class="two"><div><div class="ring" id="ring"><div><div class="big" id="clock">25:00</div><div class="muted" id="modeLabel">Work</div><div class="tag" id="sessionLabel">Session 1 of 4</div></div></div><div class="toolbar"><button class="btn primary" id="start">Start</button><button class="btn" id="pause">Pause</button><button class="btn" id="skip">Skip</button><button class="btn" id="reset">Reset</button></div></div><div class="card"><h3>Today</h3><div class="statgrid"><div class="stat"><b id="done">0</b><span>Completed work sessions</span></div><div class="stat"><b id="cycle">0</b><span>Full cycles</span></div></div><p class="muted">Your completed sessions are saved for today in localStorage. A short Web Audio alert plays when each cycle ends.</p></div></div></section></main><script>const modes=[['Work',25*60],['Short break',5*60],['Work',25*60],['Short break',5*60],['Work',25*60],['Short break',5*60],['Work',25*60],['Long break',15*60]];let idx=0,left=modes[0][1],timer=null,total=left;const $=s=>document.querySelector(s),today=new Date().toISOString().slice(0,10),key='focusflow-'+today;function saved(){return +(localStorage.getItem(key)||0)}function sound(){const ctx=new(AudioContext||webkitAudioContext)(),g=ctx.createGain();g.gain.value=.06;g.connect(ctx.destination);[660,880,660].forEach((f,i)=>{const o=ctx.createOscillator();o.frequency.value=f;o.connect(g);o.start(ctx.currentTime+i*.18);o.stop(ctx.currentTime+i*.18+.14)})}function draw(){const m=Math.floor(left/60),s=left%60;$('#clock').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');$('#modeLabel').textContent=modes[idx][0];$('#sessionLabel').textContent='Session '+(Math.floor(idx/2)+1)+' of 4';$('#ring').style.setProperty('--p',((total-left)/total*100)+'%');$('#done').textContent=saved();$('#cycle').textContent=Math.floor(saved()/4)}function complete(){if(modes[idx][0]==='Work')localStorage.setItem(key,saved()+1);sound();idx=(idx+1)%modes.length;left=total=modes[idx][1];draw()}function tick(){left--;if(left<=0)complete();draw()}$('#start').onclick=()=>{if(!timer)timer=setInterval(tick,1000)};$('#pause').onclick=()=>{clearInterval(timer);timer=null};$('#skip').onclick=complete;$('#reset').onclick=()=>{clearInterval(timer);timer=null;idx=0;left=total=modes[0][1];draw()};draw();</script></body></html>
