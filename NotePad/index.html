<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Quick Notes — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">📋</span><span>Quick Notes</span></a><div class="links"><a href="../">Home</a><a href="../MarkdownPad/">Markdown</a><button class="btn sm ghost" onclick="_openCmd()" style="font-family:var(--mono)">⌘K</button><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav>
<main class="wrap section"><section class="panel tool-page">
  <h1 class="section-title">Quick notes</h1>
  <p class="section-sub mb">Auto-saves to your browser. No accounts needed.</p>
  <div class="two" style="align-items:start">
    <div>
      <div class="toolbar mb"><button class="btn primary sm" id="newNote">New note</button><button class="btn sm" id="deleteNote">Delete</button></div>
      <input id="search" placeholder="Search notes..." class="mb">
      <div id="noteList" style="display:flex;flex-direction:column;gap:6px;max-height:440px;overflow:auto"></div>
      <p style="font-size:12px;color:var(--text-tertiary);margin-top:8px">Notes: <b id="count">0</b></p>
    </div>
    <div>
      <input id="noteTitle" placeholder="Note title..." style="font-size:17px;font-weight:800;border:none;background:transparent;padding:0 0 8px;border-bottom:1px solid var(--border);border-radius:0">
      <textarea id="noteBody" rows="18" placeholder="Start writing..." style="resize:vertical;min-height:340px;margin-top:10px"></textarea>
      <div class="stat-grid mt" style="grid-template-columns:1fr 1fr">
        <div class="stat"><b id="words">0</b><span>Words</span></div>
        <div class="stat"><b id="chars">0</b><span>Characters</span></div>
      </div>
      <div class="toolbar mt">
        <button class="btn sm" id="copyNote">Copy</button>
        <button class="btn sm" id="dlNote">Download .txt</button>
        <button class="btn sm" id="dlAll">Export all</button>
      </div>
      <p style="font-size:11px;color:var(--text-tertiary);margin-top:6px" id="saveStatus">Auto-saves as you type</p>
    </div>
  </div>
</section></main>
<script>
const $=s=>document.querySelector(s),KEY='ws-notes';
function getNotes(){return JSON.parse(localStorage.getItem(KEY)||'[]')}function saveNotes(n){localStorage.setItem(KEY,JSON.stringify(n))}
let currentId=null;
function createNote(){const notes=getNotes(),note={id:Date.now().toString(),title:'Untitled',body:'',created:new Date().toISOString(),updated:new Date().toISOString()};notes.unshift(note);saveNotes(notes);currentId=note.id;renderList();loadNote(note.id)}
function loadNote(id){currentId=id;const note=getNotes().find(n=>n.id===id);if(!note)return;$('#noteTitle').value=note.title;$('#noteBody').value=note.body;updateStats();renderList()}
function saveCurrentNote(){if(!currentId)return;const notes=getNotes(),note=notes.find(n=>n.id===currentId);if(!note)return;note.title=$('#noteTitle').value||'Untitled';note.body=$('#noteBody').value;note.updated=new Date().toISOString();saveNotes(notes);$('#saveStatus').textContent='Saved '+new Date().toLocaleTimeString();renderList()}
function deleteNote(){if(!currentId||!confirm('Delete this note?'))return;let notes=getNotes().filter(n=>n.id!==currentId);saveNotes(notes);currentId=notes.length?notes[0].id:null;if(currentId)loadNote(currentId);else{$('#noteTitle').value='';$('#noteBody').value=''}renderList();WorkSuite.toast('Deleted')}
function updateStats(){$('#words').textContent=($('#noteBody').value.match(/\S+/g)||[]).length;$('#chars').textContent=$('#noteBody').value.length}
function renderList(){const notes=getNotes(),term=$('#search').value.toLowerCase(),filtered=notes.filter(n=>(n.title+n.body).toLowerCase().includes(term));$('#count').textContent=notes.length;$('#noteList').innerHTML=filtered.map(n=>{const date=new Date(n.updated).toLocaleDateString(),preview=n.body.slice(0,50).replace(/\n/g,' ');return`<div class="note-item${n.id===currentId?' active':''}" data-id="${n.id}"><h4>${n.title||'Untitled'}</h4><p>${preview||'Empty'} · ${date}</p></div>`}).join('')||'<p style="color:var(--text-tertiary);font-size:13px">No notes</p>';document.querySelectorAll('.note-item').forEach(el=>el.onclick=()=>loadNote(el.dataset.id))}
let saveTimer;function autoSave(){clearTimeout(saveTimer);saveTimer=setTimeout(saveCurrentNote,400)}
$('#noteTitle').oninput=autoSave;$('#noteBody').oninput=()=>{updateStats();autoSave()};$('#newNote').onclick=createNote;$('#deleteNote').onclick=deleteNote;$('#search').oninput=renderList;$('#copyNote').onclick=()=>WorkSuite.copyText($('#noteBody').value);$('#dlNote').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([$('#noteBody').value],{type:'text/plain'}));a.download=($('#noteTitle').value||'note')+'.txt';a.click()};$('#dlAll').onclick=()=>{const t=getNotes().map(n=>`# ${n.title}\n${n.body}\n\n---\n`).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/plain'}));a.download='worksuite-notes.txt';a.click()};
const notes=getNotes();if(!notes.length)createNote();else{currentId=notes[0].id;loadNote(currentId)}renderList();
</script>
</body></html>
