<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sports Taxonomy — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin">
  <a class="logo" href="../"><span class="mark">🏆</span><span>Sports Taxonomy</span></a>
  <div class="links"><a href="../">Home</a><a href="../typingtest/">Typing</a>
    <button class="theme-toggle" data-theme-toggle>🌙</button>
  </div>
</div></nav>

<main class="wrap section">
  <section class="panel tool">
    <h1 class="title">Sports taxonomy explorer</h1>
    <p class="muted mb">Search, bookmark, compare and share training summaries across sports.</p>
    <div class="toolbar mb">
      <button class="tab active" data-filter="all">All</button>
      <button class="tab" data-filter="fav">Bookmarked</button>
      <button class="btn" id="random">Random</button>
    </div>
    <div class="toolbar mb gap-sm" id="tagFilters"></div>
    <input id="search" placeholder="Search sports...">
    <div id="cards" class="grid mt"></div>
    <div id="compare" class="panel tool compare hide mt"></div>
  </section>
</main>

<script>
const sports=[
  {n:'Football',cat:'Team',env:'Outdoor',train:'agility, endurance, tactical vision',tags:['Team','High Intensity','Olympic']},
  {n:'Basketball',cat:'Team',env:'Indoor/Outdoor',train:'explosiveness, coordination, reaction',tags:['Team','High Intensity','Olympic']},
  {n:'Swimming',cat:'Aquatic',env:'Pool/Open water',train:'breathing, endurance, full-body strength',tags:['Olympic','Individual','Aquatic']},
  {n:'Athletics',cat:'Track & Field',env:'Stadium',train:'speed, power, stamina',tags:['Outdoor','Olympic','Individual']},
  {n:'Chess',cat:'Mind Sport',env:'Indoor',train:'strategy, calculation, patience',tags:['Indoor','Individual','Low Impact']},
  {n:'Badminton',cat:'Racket',env:'Indoor',train:'footwork, reflexes, control',tags:['Indoor','Olympic','Fast Reflex']},
  {n:'Cricket',cat:'Bat & Ball',env:'Outdoor',train:'timing, fielding, concentration',tags:['Outdoor','Team']},
  {n:'Tennis',cat:'Racket',env:'Court',train:'serve, movement, resilience',tags:['Olympic','Individual','High Intensity']},
  {n:'Gymnastics',cat:'Artistic',env:'Indoor',train:'balance, flexibility, strength',tags:['Indoor','Olympic','Skill']},
  {n:'Volleyball',cat:'Team',env:'Indoor/Beach',train:'jumping, teamwork, court vision',tags:['Team','Olympic','High Intensity']},
  {n:'Boxing',cat:'Combat',env:'Ring',train:'power, speed, endurance, footwork',tags:['Olympic','Individual','Combat']},
  {n:'Cycling',cat:'Endurance',env:'Road/Track',train:'leg strength, stamina, aerobic capacity',tags:['Outdoor','Olympic','Endurance']},
  {n:'Table Tennis',cat:'Racket',env:'Indoor',train:'hand-eye coordination, spin, speed',tags:['Indoor','Olympic','Fast Reflex']},
  {n:'Archery',cat:'Precision',env:'Outdoor/Indoor',train:'focus, breath control, stability',tags:['Olympic','Individual','Precision']},
  {n:'Rugby',cat:'Team',env:'Outdoor',train:'tackling, sprinting, game intelligence',tags:['Team','High Intensity','Contact']},
  {n:'Fencing',cat:'Combat',env:'Indoor',train:'reaction, strategy, blade control',tags:['Olympic','Individual','Combat']},
  {n:'Weightlifting',cat:'Strength',env:'Indoor',train:'power, technique, core stability',tags:['Olympic','Individual','Strength']},
  {n:'Yoga',cat:'Mind-Body',env:'Indoor/Outdoor',train:'flexibility, breath, mindfulness',tags:['Indoor','Individual','Low Impact']},
  {n:'Skateboarding',cat:'Action',env:'Outdoor/Park',train:'balance, creativity, spatial awareness',tags:['Outdoor','Olympic','Skill']},
  {n:'Rowing',cat:'Aquatic',env:'Water',train:'endurance, synchronization, core power',tags:['Olympic','Team','Endurance']}
];

const $=s=>document.querySelector(s);
let filter='all',tagFilter='',selected=[];

function favs(){return JSON.parse(localStorage.sportFavs||'[]')}
function saveFavs(a){localStorage.sportFavs=JSON.stringify(a)}

// build tag filter buttons
const allTags=[...new Set(sports.flatMap(s=>s.tags))].sort();
$('#tagFilters').innerHTML='<button class="tag" data-tag="" style="cursor:pointer">All tags</button>'+allTags.map(t=>`<button class="tag" data-tag="${t}" style="cursor:pointer">${t}</button>`).join('');
$('#tagFilters').addEventListener('click',e=>{
  const btn=e.target.closest('[data-tag]');
  if(!btn)return;
  tagFilter=btn.dataset.tag;
  document.querySelectorAll('#tagFilters [data-tag]').forEach(b=>b.style.fontWeight=b.dataset.tag===tagFilter?'900':'700');
  render();
});

function render(){
  let f=favs(),term=$('#search').value.toLowerCase();
  let list=sports.filter(x=>
    (filter==='all'||f.includes(x.n))&&
    JSON.stringify(x).toLowerCase().includes(term)&&
    (!tagFilter||x.tags.includes(tagFilter))
  );
  $('#cards').innerHTML=list.map(s=>`<article class="card" data-name="${s.n}">
    <div class="icon">🏅</div>
    <h3>${s.n}</h3>
    <p class="muted"><b>${s.cat}</b> · ${s.env}</p>
    <p class="muted">Training: ${s.train}</p>
    ${s.tags.map(t=>`<span class="badge">${t}</span>`).join('')}
    <div class="toolbar">
      <button class="btn fav">${f.includes(s.n)?'★ Saved':'☆ Save'}</button>
      <button class="btn cmp">${selected.includes(s.n)?'✓ Comparing':'Compare'}</button>
      <button class="btn share">Share</button>
    </div>
  </article>`).join('')||'<p class="muted">No sports match your filters.</p>';
  bind();compare();
}

function bind(){
  document.querySelectorAll('[data-name]').forEach(card=>{
    const name=card.dataset.name,s=sports.find(x=>x.n===name);
    card.querySelector('.fav').onclick=()=>{let f=favs();f=f.includes(name)?f.filter(x=>x!==name):[...f,name];saveFavs(f);render()};
    card.querySelector('.cmp').onclick=()=>{selected=selected.includes(name)?selected.filter(x=>x!==name):[...selected.slice(-1),name];render()};
    card.querySelector('.share').onclick=()=>WorkSuite.copyText(`${s.n}: ${s.cat} sport, ${s.env}. Training focus: ${s.train}.`);
  });
}

function compare(){
  if(selected.length<2){$('#compare').classList.add('hide');return}
  let a=selected.map(n=>sports.find(s=>s.n===n));
  $('#compare').classList.remove('hide');
  $('#compare').innerHTML=`<h2>Comparison</h2>
  <table class="table"><tr><th>Attribute</th><th>${a[0].n}</th><th>${a[1].n}</th></tr>
  <tr><td>Category</td><td>${a[0].cat}</td><td>${a[1].cat}</td></tr>
  <tr><td>Environment</td><td>${a[0].env}</td><td>${a[1].env}</td></tr>
  <tr><td>Training</td><td>${a[0].train}</td><td>${a[1].train}</td></tr>
  <tr><td>Tags</td><td>${a[0].tags.join(', ')}</td><td>${a[1].tags.join(', ')}</td></tr></table>`;
}

document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('[data-filter]').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');filter=b.dataset.filter;render();
});
$('#random').onclick=()=>{const s=sports[Math.floor(Math.random()*sports.length)];$('#search').value=s.n;filter='all';render()};
$('#search').oninput=render;
render();
</script>
</body>
</html>
