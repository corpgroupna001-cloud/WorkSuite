<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sports Taxonomy</title><link rel="stylesheet" href="../assets/styles.css"></head><body><nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">🏆</span><span>Sports Taxonomy</span></a><div class="links"><a href="../">Home</a><a href="../typingtest/">Typing</a></div></div></nav><main class="wrap section"><section class="panel tool"><h1 class="title">Sports taxonomy explorer</h1><p class="muted">Search sports by category, environment, skill type, and training focus.</p><input id="search" placeholder="Search football, swimming, chess, athletics..."><div id="cards" class="grid" style="margin-top:18px"></div></section></main><script>const sports=[['Football','Team','Outdoor','agility, endurance, tactical vision'],['Basketball','Team','Indoor/Outdoor','explosiveness, coordination, reaction'],['Swimming','Aquatic','Pool/Open water','breathing, endurance, full-body strength'],['Athletics','Track & Field','Stadium','speed, power, stamina'],['Chess','Mind Sport','Indoor','strategy, calculation, patience'],['Badminton','Racket','Indoor','footwork, reflexes, control'],['Cricket','Bat & Ball','Outdoor','timing, fielding, concentration'],['Tennis','Racket','Court','serve, movement, resilience'],['Gymnastics','Artistic','Indoor','balance, flexibility, strength']];const q=s=>document.querySelector(s);function render(){let term=q('#search').value.toLowerCase();q('#cards').innerHTML=sports.filter(x=>x.join(' ').toLowerCase().includes(term)).map(s=>`<article class="card"><div class="icon">🏅</div><h3>${s[0]}</h3><p class="muted"><b>${s[1]}</b> · ${s[2]}</p><span class="tag">${s[3]}</span></article>`).join('')}q('#search').oninput=render;render();</script></body></html>
