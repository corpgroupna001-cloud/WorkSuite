<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sports Taxonomy</title><link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script></head><body><nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">🏆</span><span>Sports Taxonomy</span></a><div class="links"><a href="../">Home</a><a href="../typingtest/">Typing</a><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav><main class="wrap section"><section class="panel tool"><h1 class="title">Sports taxonomy explorer</h1><p class="muted">Search, browse favourites, compare two sports and share training summaries.</p><div class="toolbar"><button class="tab active" data-filter="all">All</button><button class="tab" data-filter="fav">My Favourites</button><button class="btn primary" id="random">Random Sport</button></div><input id="search" placeholder="Search football, swimming, chess, athletics..."><div id="cards" class="grid" style="margin-top:18px"></div><div id="compare" class="panel tool compare hide" style="margin-top:20px"></div></section></main><script>const sports=[{n:'Football',cat:'Team',env:'Outdoor',train:'agility, endurance, tactical vision',tags:['Outdoor','Team','High Intensity']},{n:'Basketball',cat:'Team',env:'Indoor/Outdoor',train:'explosiveness, coordination, reaction',tags:['Team','High Intensity','Olympic']},{n:'Swimming',cat:'Aquatic',env:'Pool/Open water',train:'breathing, endurance, full-body strength',tags:['Olympic','Individual','High Intensity']},{n:'Athletics',cat:'Track & Field',env:'Stadium',train:'speed, power, stamina',tags:['Outdoor','Olympic','High Intensity']},{n:'Chess',cat:'Mind Sport',env:'Indoor',train:'strategy, calculation, patience',tags:['Indoor','Individual','Low Impact']},{n:'Badminton',cat:'Racket',env:'Indoor',train:'footwork, reflexes, control',tags:['Indoor','Olympic','Fast Reflex']},{n:'Cricket',cat:'Bat & Ball',env:'Outdoor',train:'timing, fielding, concentration',tags:['Outdoor','Team']},{n:'Tennis',cat:'Racket',env:'Court',train:'serve, movement, resilience',tags:['Olympic','Individual','High Intensity']},{n:'Gymnastics',cat:'Artistic',env:'Indoor',train:'balance, flexibility, strength',tags:['Indoor','Olympic','Skill'] }];const $=s=>document.querySelector(s);let filter='all',selected=[];function favs(){return JSON.parse(localStorage.sportFavs||'[]')}function saveFavs(a){localStorage.sportFavs=JSON.stringify(a)}function render(){let f=favs(),term=$('#search').value.toLowerCase(),list=sports.filter(x=>(filter==='all'||f.includes(x.n))&&JSON.stringify(x).toLowerCase().includes(term));$('#cards').innerHTML=list.map(s=>`<article class="card" data-name="${s.n}"><div class="icon">🏅</div><h3>${s.n}</h3><p class="muted"><b>${s.cat}</b> · ${s.env}</p><p class="muted">Training: ${s.train}</p>${s.tags.map(t=>`<span class="badge">${t}</span>`).join('')}<div class="toolbar"><button class="btn fav">${f.includes(s.n)?'★ Bookmarked':'☆ Bookmark'}</button><button class="btn cmp">Compare</button><button class="btn share">Share</button></div></article>`).join('')||'<p class="muted">No sports found.</p>';bind();compare()}function bind(){document.querySelectorAll('[data-name]').forEach(card=>{const name=card.dataset.name,s=sports.find(x=>x.n===name);card.querySelector('.fav').onclick=()=>{let f=favs();f=f.includes(name)?f.filter(x=>x!==name):[...f,name];saveFavs(f);render()};card.querySelector('.cmp').onclick=()=>{selected=selected.includes(name)?selected.filter(x=>x!==name):[...selected.slice(-1),name];render()};card.querySelector('.share').onclick=()=>navigator.clipboard.writeText(`${s.n}: ${s.cat} sport, ${s.env}. Training focus: ${s.train}.`)})}function compare(){if(selected.length<2){$('#compare').classList.add('hide');return}let a=selected.map(n=>sports.find(s=>s.n===n));$('#compare').classList.remove('hide');$('#compare').innerHTML=`<h2>Sport comparison</h2><table class="table"><tr><th>Attribute</th><th>${a[0].n}</th><th>${a[1].n}</th></tr><tr><td>Category</td><td>${a[0].cat}</td><td>${a[1].cat}</td></tr><tr><td>Environment</td><td>${a[0].env}</td><td>${a[1].env}</td></tr><tr><td>Training</td><td>${a[0].train}</td><td>${a[1].train}</td></tr><tr><td>Tags</td><td>${a[0].tags.join(', ')}</td><td>${a[1].tags.join(', ')}</td></tr></table>`}document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));b.classList.add('active');filter=b.dataset.filter;render()});$('#random').onclick=()=>{const s=sports[Math.floor(Math.random()*sports.length)];$('#search').value=s.n;filter='all';render();setTimeout(()=>document.querySelector(`[data-name="${s.n}"]`)?.classList.add('pulse'),50)};$('#search').oninput=render;render();</script></body></html>
