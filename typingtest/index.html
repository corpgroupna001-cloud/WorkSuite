<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ZenType AI — Adaptive Typing Test</title><link rel="stylesheet" href="../assets/styles.css"></head><body><nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">⌨</span><span>ZenType AI</span></a><div class="links"><a href="../">Home</a><a href="../signature/">Signature</a></div></div></nav><main class="wrap section"><section class="panel tool"><span class="eyebrow">2 minute adaptive typing challenge</span><h1 class="title">Train speed without losing accuracy.</h1><div class="statgrid"><div class="stat"><b id="wpm">0</b><span>Words / min</span></div><div class="stat"><b id="acc">100%</b><span>Accuracy</span></div><div class="stat"><b id="err">0</b><span>Errors</span></div><div class="stat"><b class="timer" id="time">02:00</b><span>Time</span></div></div><div class="toolbar"><button class="btn primary" id="start">Start</button><button class="btn" id="reset">Reset</button><button class="btn" id="next">New Passage</button></div><p class="muted">Type the passage below. Results save locally.</p><div id="passage" class="passage"></div><textarea id="input" rows="5" placeholder="Start typing here..."></textarea><div id="tip" class="tag">Focus on accuracy first; speed will follow.</div></section><section class="section"><h2>Performance History</h2><table class="table"><thead><tr><th>Attempt</th><th>WPM</th><th>Accuracy</th><th>Errors</th></tr></thead><tbody id="history"></tbody></table></section></main><script>const passages=['Consistent typing skill grows through calm focus, steady rhythm, and careful correction. Keep your eyes moving slightly ahead of your fingers, relax your shoulders, and let accuracy lead speed.','Modern work rewards people who can think clearly and communicate quickly. Type each word with purpose, keep your rhythm steady, and notice where your attention begins to drift.','Professional performance is built through small repeatable improvements. Breathe calmly, look ahead, and let every sentence become a clean practice rep.'];let text=passages[0],started=false,secs=120,timer=null,attempt=1;const q=s=>document.querySelector(s),input=q('#input'),p=q('#passage');function draw(){p.innerHTML=text.split('').map((c,i)=>`<span>${c}</span>`).join('')}function stats(){let v=input.value,err=0;[...p.children].forEach((s,i)=>{s.className='';if(v[i]==null)return;if(v[i]===text[i])s.className='ok';else{s.className='bad';err++}});let words=v.trim()?v.trim().split(/\s+/).length:0,mins=(120-secs)/60||1/60,wpm=Math.round(words/mins),acc=v.length?Math.max(0,Math.round(((v.length-err)/v.length)*100)):100;q('#wpm').textContent=wpm;q('#acc').textContent=acc+'%';q('#err').textContent=err;return{wpm,acc,err}}function tick(){secs--;q('#time').textContent=String(Math.floor(secs/60)).padStart(2,'0')+':'+String(secs%60).padStart(2,'0');if(secs<=0)finish()}function start(){if(started)return;started=true;timer=setInterval(tick,1000);input.focus()}async function finish(){clearInterval(timer);started=false;const r=stats(),hist=JSON.parse(localStorage.ztHist||'[]');hist.unshift({attempt:attempt++,wpm:r.wpm,acc:r.acc,err:r.err});localStorage.ztHist=JSON.stringify(hist.slice(0,10));renderHist();try{const res=await fetch('/api/groq',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(r)});const data=await res.json();text=data.passage||text;q('#tip').textContent=data.tip||'Great session. Keep practicing.'}catch{}reset(false)}function reset(clear=true){clearInterval(timer);started=false;secs=120;input.value='';q('#time').textContent='02:00';if(clear)q('#tip').textContent='Focus on accuracy first; speed will follow.';draw();stats()}function renderHist(){q('#history').innerHTML=(JSON.parse(localStorage.ztHist||'[]')).map((h,i)=>`<tr><td>${h.attempt||i+1}</td><td>${h.wpm}</td><td>${h.acc}%</td><td>${h.err}</td></tr>`).join('')}q('#start').onclick=start;q('#reset').onclick=()=>reset();q('#next').onclick=()=>{text=passages[Math.floor(Math.random()*passages.length)];reset()};input.oninput=()=>{if(!started)start();stats();if(input.value.length>=text.length)finish()};draw();renderHist();</script></body></html>
