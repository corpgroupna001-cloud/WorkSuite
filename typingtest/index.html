<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ZenType AI — Typing Test</title><link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body><nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">⌨</span><span>ZenType AI</span></a><div class="links"><a href="../">Home</a><a href="../signature/">Signature</a><a href="../FocusFlow/">FocusFlow</a><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav><main class="wrap section"><section class="panel tool"><span class="eyebrow">Adaptive typing challenge</span><h1 class="title">Train speed without losing accuracy.</h1><div class="formgrid"><label>Time mode<select id="duration"><option value="30">30s</option><option value="60">1 min</option><option selected value="120">2 min</option><option value="300">5 min</option></select></label><label>Difficulty<select id="difficulty"><option>Easy</option><option>Medium</option><option>Hard</option></select></label></div><div class="statgrid"><div class="stat"><b id="wpm">0</b><span>Words / min</span></div><div class="stat"><b id="acc">100%</b><span>Accuracy</span></div><div class="stat"><b id="err">0</b><span>Errors</span></div><div class="stat"><b class="timer" id="time">02:00</b><span>Time</span></div></div><div class="toolbar"><button class="btn primary" id="start">Start</button><button class="btn" id="reset">Reset</button><button class="btn" id="next">New Passage</button></div><div id="passage" class="passage"></div><textarea id="input" rows="5" placeholder="Start typing here..."></textarea><div id="results" class="card hide"></div></section><section class="section"><h2>Performance History</h2><canvas id="chart" height="120"></canvas><table class="table"><thead><tr><th>Attempt</th><th>WPM</th><th>Accuracy</th><th>Errors</th></tr></thead><tbody id="history"></tbody></table><h2>Keyboard heatmap</h2><svg id="heat" viewBox="0 0 760 180" style="width:100%;max-width:860px"></svg></section></main><script>const banks={Easy:['focus calm steady rhythm words practice clean speed accuracy improve today bright simple useful work'],Medium:['Modern work rewards clear thinking, fast communication, resilient focus, and careful correction under pressure.'],Hard:['const score = Math.max(0, wpm*accuracy) => { return `speed:${wpm}`; } // symbols: []{}!@#$%^&*()']};let text='',started=false,secs=120,total=120,timer=null;const $=s=>document.querySelector(s),input=$('#input');function pick(){const d=$('#difficulty').value,base=banks[d][Math.floor(Math.random()*banks[d].length)];text=Array(6).fill(base).join(' ').slice(0,d==='Hard'?360:520)}function fmt(n){return String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0')}function draw(){let v=input.value;$('#passage').innerHTML=[...text].map((c,i)=>`<span class="${v[i]==null?(i===v.length?'current':''):v[i]===c?'ok':'bad'}">${c===' '?'&nbsp;':c}</span>`).join('')}function stats(){let v=input.value,err=0;[...v].forEach((c,i)=>{if(c!==text[i])err++});let mins=(total-secs)/60||1/60,wpm=Math.round((v.trim().split(/\s+/).filter(Boolean).length)/mins),acc=v.length?Math.max(0,Math.round(((v.length-err)/v.length)*100)):100;$('#wpm').textContent=wpm;$('#acc').textContent=acc+'%';$('#err').textContent=err;draw();return{wpm,acc,err}}function tick(){secs--;$('#time').textContent=fmt(secs);if(secs<=0)finish()}function start(){if(started)return;started=true;timer=setInterval(tick,1000);input.focus()}function reset(full=true){clearInterval(timer);started=false;total=secs=+$('#duration').value;$('#time').textContent=fmt(secs);input.value='';if(full)$('#results').classList.add('hide');draw();stats()}async function finish(){if(!started&&secs>0)return;clearInterval(timer);started=false;const r=stats(),hist=JSON.parse(localStorage.ztHist||'[]'),miss=JSON.parse(localStorage.ztMiss||'{}');[...input.value].forEach((c,i)=>{if(c!==text[i])miss[text[i]||'?']=(miss[text[i]||'?']||0)+1});hist.unshift({...r,date:new Date().toLocaleString(),difficulty:$('#difficulty').value,duration:total});localStorage.ztHist=JSON.stringify(hist.slice(0,50));localStorage.ztMiss=JSON.stringify(miss);$('#results').className='card';$('#results').innerHTML=`<h3>Results</h3><p><b>${r.wpm} WPM</b> · ${r.acc}% accuracy · ${r.err} errors</p><button class="btn primary" id="share">Share result</button>`;$('#share').onclick=async()=>navigator.clipboard.writeText(`ZenType AI result: ${r.wpm} WPM, ${r.acc}% accuracy, ${r.err} errors (${total}s ${$('#difficulty').value}).`);renderHist();heat()}function renderHist(){const hist=JSON.parse(localStorage.ztHist||'[]');$('#history').innerHTML=hist.slice(0,10).map((h,i)=>`<tr><td>${i+1}</td><td>${h.wpm}</td><td>${h.acc}%</td><td>${h.err}</td></tr>`).join('');if(window.chart)window.chart.destroy();window.chart=new Chart($('#chart'),{type:'line',data:{labels:hist.slice(0,10).reverse().map((_,i)=>i+1),datasets:[{label:'WPM',data:hist.slice(0,10).reverse().map(h=>h.wpm),tension:.35}]},options:{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}})}function heat(){const keys='QWERTYUIOP ASDFGHJKL ZXCVBNM'.split(' '),miss=JSON.parse(localStorage.ztMiss||'{}');let y=10,svg='';keys.forEach((row,ri)=>{[...row].forEach((k,i)=>{let hot=miss[k.toLowerCase()]||miss[k]||0;svg+=`<rect class="heatkey ${hot?'hot':''}" x="${20+i*66+ri*28}" y="${y}" width="56" height="42" rx="9"></rect><text x="${48+i*66+ri*28}" y="${y+27}" text-anchor="middle" fill="currentColor">${k}</text>`});y+=56});$('#heat').innerHTML=svg}$('#start').onclick=start;$('#reset').onclick=()=>reset();$('#next').onclick=()=>{pick();reset()};$('#duration').onchange=()=>reset();$('#difficulty').onchange=()=>{pick();reset()};input.oninput=()=>{if(!started)start();stats();if(input.value.length>=text.length)finish()};pick();reset();renderHist();heat();</script></body></html>
