<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Color Palette — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">🎨</span><span>Color Palette</span></a><div class="links"><a href="../">Home</a><button class="btn sm ghost" onclick="_openCmd()" style="font-family:var(--mono)">⌘K</button><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav>
<main class="wrap section"><section class="panel tool-page">
  <h1 class="section-title">Color palette generator</h1>
  <p class="section-sub mb">Pick a base color or generate random harmonious palettes. Click swatches to copy.</p>
  <div class="two mb">
    <div>
      <label>Base color<input type="color" id="base" value="#6246ea" style="height:44px"></label>
      <label class="mt">Harmony<select id="harmony"><option value="analogous">Analogous</option><option value="complementary">Complementary</option><option value="triadic">Triadic</option><option value="split">Split-complementary</option><option value="monochromatic">Monochromatic</option></select></label>
      <div class="toolbar mt"><button class="btn primary" id="gen">Generate</button><button class="btn" id="random">Random</button><button class="btn" id="copyCSS">Copy CSS</button></div>
    </div>
    <div>
      <label>HEX Converter</label>
      <input id="hexInput" placeholder="#6246ea" value="#6246ea">
      <div class="output-box mt" id="converted" style="font-size:13px"></div>
    </div>
  </div>
  <div class="grid" id="palette" style="grid-template-columns:repeat(5,1fr)"></div>
  <h2 style="font-size:16px;margin-top:20px">Saved palettes</h2>
  <div id="saved" class="mt"></div>
  <div class="toolbar mt"><button class="btn sm" id="save">Save current</button><button class="btn sm" id="clearSaved">Clear</button></div>
</section></main>
<script>
const $=s=>document.querySelector(s);
function hexToHSL(h){let r=parseInt(h.slice(1,3),16)/255,g=parseInt(h.slice(3,5),16)/255,b=parseInt(h.slice(5,7),16)/255,mx=Math.max(r,g,b),mn=Math.min(r,g,b),hue,s,l=(mx+mn)/2;if(mx===mn){hue=s=0}else{let d=mx-mn;s=l>.5?d/(2-mx-mn):d/(mx+mn);switch(mx){case r:hue=((g-b)/d+(g<b?6:0))/6;break;case g:hue=((b-r)/d+2)/6;break;case b:hue=((r-g)/d+4)/6;break}}return[Math.round(hue*360),Math.round(s*100),Math.round(l*100)]}
function hslToHex(h,s,l){h=((h%360)+360)%360;s/=100;l/=100;const a=s*Math.min(l,1-l),f=n=>{const k=(n+h/30)%12,c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};return'#'+f(0)+f(8)+f(4)}
function hexToRGB(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function generate(){const hex=$('#base').value,[h,s,l]=hexToHSL(hex),mode=$('#harmony').value;let hues;switch(mode){case'analogous':hues=[h-30,h-15,h,h+15,h+30];break;case'complementary':hues=[h,h+30,h+60,h+180,h+210];break;case'triadic':hues=[h,h+40,h+120,h+200,h+240];break;case'split':hues=[h,h+30,h+150,h+210,h+330];break;case'monochromatic':return[hslToHex(h,s,Math.max(10,l-30)),hslToHex(h,s,Math.max(10,l-15)),hex,hslToHex(h,s,Math.min(90,l+15)),hslToHex(h,s,Math.min(90,l+30))]}return hues.map(hh=>hslToHex(hh,s,l))}
let pal=[];
function render(){pal=generate();$('#palette').innerHTML=pal.map(c=>{const[r,g,b]=hexToRGB(c),lum=(r*299+g*587+b*114)/1000;return`<div class="swatch" style="background:${c};color:${lum>128?'#000':'#fff'}" data-hex="${c}">${c}</div>`}).join('');document.querySelectorAll('.swatch').forEach(s=>s.onclick=()=>WorkSuite.copyText(s.dataset.hex))}
function convert(){let v=$('#hexInput').value.trim();if(!v.startsWith('#'))v='#'+v;if(!/^#[0-9a-f]{6}$/i.test(v)){$('#converted').textContent='Enter valid hex like #6246ea';return}const[h,s,l]=hexToHSL(v),[r,g,b]=hexToRGB(v);$('#converted').innerHTML=`HEX: ${v}<br>RGB: rgb(${r}, ${g}, ${b})<br>HSL: hsl(${h}, ${s}%, ${l}%)`}
function savedP(){return JSON.parse(localStorage.colorPalettes||'[]')}
function renderSaved(){const sp=savedP();$('#saved').innerHTML=sp.map((p,i)=>`<div style="display:flex;gap:3px;margin-bottom:6px;cursor:pointer" data-pi="${i}">${p.map(c=>`<div style="width:36px;height:24px;border-radius:5px;background:${c}"></div>`).join('')}</div>`).join('')||'<p style="color:var(--text-tertiary);font-size:13px">No saved palettes</p>';document.querySelectorAll('[data-pi]').forEach(el=>el.onclick=()=>{const css=sp[+el.dataset.pi].map((c,i)=>`--color-${i+1}: ${c};`).join('\n  ');WorkSuite.copyText(`:root {\n  ${css}\n}`)})}
$('#base').oninput=render;$('#harmony').onchange=render;$('#gen').onclick=render;$('#random').onclick=()=>{const a=new Uint8Array(3);crypto.getRandomValues(a);$('#base').value='#'+[...a].map(n=>n.toString(16).padStart(2,'0')).join('');render()};$('#hexInput').oninput=convert;$('#copyCSS').onclick=()=>{const css=pal.map((c,i)=>`--color-${i+1}: ${c};`).join('\n  ');WorkSuite.copyText(`:root {\n  ${css}\n}`)};$('#save').onclick=()=>{const sp=savedP();sp.unshift(pal);localStorage.colorPalettes=JSON.stringify(sp.slice(0,10));renderSaved();WorkSuite.toast('Saved')};$('#clearSaved').onclick=()=>{localStorage.removeItem('colorPalettes');renderSaved();WorkSuite.toast('Cleared')};
render();convert();renderSaved();
</script>
</body></html>
