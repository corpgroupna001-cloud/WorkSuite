<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Color Palette — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin">
  <a class="logo" href="../"><span class="mark">🎨</span><span>Color Palette</span></a>
  <div class="links"><a href="../">Home</a><a href="../MarkdownPad/">Markdown</a>
    <button class="theme-toggle" data-theme-toggle>🌙</button>
  </div>
</div></nav>

<main class="wrap section">
  <section class="panel tool">
    <h1 class="title">Color palette generator</h1>
    <p class="muted mb">Pick a base color or generate random harmonious palettes. Click any swatch to copy its value.</p>

    <div class="two mb">
      <div>
        <label>Base color<input type="color" id="base" value="#6c47ff" style="height:48px"></label>
        <label class="mt">Harmony<select id="harmony">
          <option value="analogous">Analogous</option>
          <option value="complementary">Complementary</option>
          <option value="triadic">Triadic</option>
          <option value="split">Split-complementary</option>
          <option value="tetradic">Tetradic</option>
          <option value="monochromatic">Monochromatic</option>
        </select></label>
        <div class="toolbar mt">
          <button class="btn primary" id="gen">Generate</button>
          <button class="btn" id="random">Random base</button>
          <button class="btn" id="copyCSS">Copy CSS</button>
        </div>
      </div>
      <div>
        <label>Converter</label>
        <input id="hexInput" placeholder="#6c47ff" value="#6c47ff">
        <div class="output-box mt" id="converted" style="font-size:13px"></div>
      </div>
    </div>

    <div class="grid" id="palette" style="grid-template-columns:repeat(5,1fr)"></div>

    <h2 class="mt">Saved palettes</h2>
    <div id="saved"></div>
    <div class="toolbar mt">
      <button class="btn" id="save">Save current palette</button>
      <button class="btn" id="clearSaved">Clear saved</button>
    </div>
  </section>
</main>

<script>
const $=s=>document.querySelector(s);

function hexToHSL(hex){
  let r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  let max=Math.max(r,g,b),min=Math.min(r,g,b),h,s,l=(max+min)/2;
  if(max===min){h=s=0}else{
    let d=max-min;s=l>.5?d/(2-max-min):d/(max+min);
    switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}
  }
  return[Math.round(h*360),Math.round(s*100),Math.round(l*100)];
}

function hslToHex(h,s,l){
  h=((h%360)+360)%360;s/=100;l/=100;
  const a=s*Math.min(l,1-l);
  const f=n=>{const k=(n+h/30)%12;const c=l-a*Math.max(Math.min(k-3,9-k,1),-1);return Math.round(255*c).toString(16).padStart(2,'0')};
  return'#'+f(0)+f(8)+f(4);
}

function hexToRGB(hex){return[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)]}

function generate(){
  const hex=$('#base').value;
  const [h,s,l]=hexToHSL(hex);
  const mode=$('#harmony').value;
  let hues=[];
  switch(mode){
    case'analogous':hues=[h-30,h-15,h,h+15,h+30];break;
    case'complementary':hues=[h,h+30,h+60,h+180,h+210];break;
    case'triadic':hues=[h,h+40,h+120,h+200,h+240];break;
    case'split':hues=[h,h+30,h+150,h+210,h+330];break;
    case'tetradic':hues=[h,h+90,h+180,h+270,h+45];break;
    case'monochromatic':return [hslToHex(h,s,Math.max(10,l-30)),hslToHex(h,s,Math.max(10,l-15)),hex,hslToHex(h,s,Math.min(90,l+15)),hslToHex(h,s,Math.min(90,l+30))];
  }
  return hues.map(hh=>hslToHex(hh,s,l));
}

let currentPalette=[];

function render(){
  currentPalette=generate();
  $('#palette').innerHTML=currentPalette.map((c,i)=>{
    const [r,g,b]=hexToRGB(c);
    const lum=(r*299+g*587+b*114)/1000;
    const fg=lum>128?'#000':'#fff';
    return`<div class="swatch" style="background:${c};color:${fg}" data-hex="${c}">${c}</div>`;
  }).join('');
  document.querySelectorAll('.swatch').forEach(sw=>sw.onclick=()=>WorkSuite.copyText(sw.dataset.hex));
}

function convert(){
  let v=$('#hexInput').value.trim();
  if(!v.startsWith('#'))v='#'+v;
  if(!/^#[0-9a-f]{6}$/i.test(v)){$('#converted').textContent='Enter a valid hex like #6c47ff';return}
  const[h,s,l]=hexToHSL(v);
  const[r,g,b]=hexToRGB(v);
  $('#converted').innerHTML=`HEX: ${v}<br>RGB: rgb(${r}, ${g}, ${b})<br>HSL: hsl(${h}, ${s}%, ${l}%)`;
}

function savedPalettes(){return JSON.parse(localStorage.colorPalettes||'[]')}

function renderSaved(){
  const sp=savedPalettes();
  $('#saved').innerHTML=sp.map((p,i)=>`<div style="display:flex;gap:4px;margin-bottom:8px;cursor:pointer" data-pi="${i}">${p.map(c=>`<div style="width:40px;height:30px;border-radius:6px;background:${c}"></div>`).join('')}</div>`).join('')||'<p class="muted">No saved palettes.</p>';
  document.querySelectorAll('[data-pi]').forEach(el=>el.onclick=()=>{
    const p=sp[+el.dataset.pi];
    const css=p.map((c,i)=>`--color-${i+1}: ${c};`).join('\n  ');
    WorkSuite.copyText(`:root {\n  ${css}\n}`);
  });
}

$('#base').oninput=render;
$('#harmony').onchange=render;
$('#gen').onclick=render;
$('#random').onclick=()=>{const arr=new Uint8Array(3);crypto.getRandomValues(arr);$('#base').value='#'+[...arr].map(n=>n.toString(16).padStart(2,'0')).join('');render()};
$('#hexInput').oninput=convert;
$('#copyCSS').onclick=()=>{
  const css=currentPalette.map((c,i)=>`--color-${i+1}: ${c};`).join('\n  ');
  WorkSuite.copyText(`:root {\n  ${css}\n}`);
};
$('#save').onclick=()=>{const sp=savedPalettes();sp.unshift(currentPalette);localStorage.colorPalettes=JSON.stringify(sp.slice(0,10));renderSaved();WorkSuite.toast('Palette saved')};
$('#clearSaved').onclick=()=>{localStorage.removeItem('colorPalettes');renderSaved();WorkSuite.toast('Cleared')};

render();convert();renderSaved();
</script>
</body>
</html>
