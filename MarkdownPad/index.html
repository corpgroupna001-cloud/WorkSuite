<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Markdown Editor — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">📝</span><span>Markdown</span></a><div class="links"><a href="../">Home</a><a href="../WordCountPro/">WordCount</a><button class="btn sm ghost" onclick="_openCmd()" style="font-family:var(--mono)">⌘K</button><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav>
<main class="wrap section"><section class="panel tool-page">
  <h1 class="section-title">Markdown editor</h1>
  <div class="toolbar mb">
    <button class="btn sm" data-ins="**" title="Bold"><b>B</b></button>
    <button class="btn sm" data-ins="*" title="Italic"><i>I</i></button>
    <button class="btn sm" data-ins="`" title="Code">&lt;/&gt;</button>
    <button class="btn sm" data-ins="## " data-line title="Heading">H2</button>
    <button class="btn sm" data-ins="- " data-line title="List">List</button>
    <button class="btn sm" data-ins="> " data-line title="Quote">Quote</button>
    <button class="btn sm primary" id="exportHTML">Export HTML</button>
    <button class="btn sm" id="exportMD">Download .md</button>
    <button class="btn sm" id="save">Save draft</button>
    <button class="btn sm" id="load">Load draft</button>
  </div>
  <div class="two" style="align-items:stretch">
    <div><label>Markdown</label><textarea id="editor" rows="18" spellcheck="false" style="font-family:var(--mono);font-size:13px;resize:vertical;min-height:380px" placeholder="# Hello World&#10;&#10;Write **markdown** here."></textarea></div>
    <div><label>Preview</label><div class="md-preview" id="preview" style="min-height:380px"></div></div>
  </div>
  <div class="stat-grid cols-4 mt">
    <div class="stat"><b id="words">0</b><span>Words</span></div>
    <div class="stat"><b id="chars">0</b><span>Characters</span></div>
    <div class="stat"><b id="lines">0</b><span>Lines</span></div>
    <div class="stat"><b id="read">0m</b><span>Read time</span></div>
  </div>
</section></main>
<script>
const $=s=>document.querySelector(s),editor=$('#editor');
function md(t){return'<p>'+t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>').replace(/^#### (.+)$/gm,'<h4>$1</h4>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/^---$/gm,'<hr>').replace(/\*\*\*(.+?)\*\*\*/g,'<b><i>$1</i></b>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1" style="max-width:100%;border-radius:8px">').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" style="color:var(--brand)">$1</a>').replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^- (.+)$/gm,'<li>$1</li>').replace(/^\d+\. (.+)$/gm,'<li>$1</li>').replace(/(<li>.*<\/li>\n?)+/g,m=>'<ul>'+m+'</ul>').replace(/\n{2,}/g,'</p><p>').replace(/\n/g,'<br>')+'</p>'}
function render(){$('#preview').innerHTML=md(editor.value);const w=(editor.value.match(/\S+/g)||[]).length;$('#words').textContent=w;$('#chars').textContent=editor.value.length;$('#lines').textContent=editor.value.split('\n').length;$('#read').textContent=Math.max(1,Math.ceil(w/200))+'m'}
document.querySelectorAll('[data-ins]').forEach(btn=>{btn.onclick=()=>{const ins=btn.dataset.ins,s=editor.selectionStart,e=editor.selectionEnd,sel=editor.value.substring(s,e);if(btn.dataset.line){const ls=editor.value.lastIndexOf('\n',s-1)+1;editor.setRangeText(ins,ls,ls)}else{editor.setRangeText(ins+sel+ins,s,e)}editor.focus();render()}});
editor.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const s=editor.selectionStart;editor.setRangeText('  ',s,s);editor.selectionStart=editor.selectionEnd=s+2;render()}});
$('#exportHTML').onclick=()=>{const html=`<!doctype html><html><head><meta charset="utf-8"><title>Document</title><style>body{font-family:system-ui;max-width:720px;margin:40px auto;padding:0 20px;line-height:1.7}code{background:#f3f4f6;padding:2px 6px;border-radius:4px}pre{background:#f3f4f6;padding:16px;border-radius:8px;overflow-x:auto}blockquote{border-left:3px solid #6246ea;padding-left:16px;color:#6b7280;font-style:italic}</style></head><body>${md(editor.value)}</body></html>`;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([html],{type:'text/html'}));a.download='document.html';a.click()};
$('#exportMD').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([editor.value],{type:'text/markdown'}));a.download='document.md';a.click()};
$('#save').onclick=()=>{localStorage.mdDraft=editor.value;WorkSuite.toast('Draft saved')};
$('#load').onclick=()=>{if(localStorage.mdDraft){editor.value=localStorage.mdDraft;render();WorkSuite.toast('Draft loaded')}else WorkSuite.toast('No saved draft')};
editor.oninput=render;if(localStorage.mdDraft)editor.value=localStorage.mdDraft;render();
</script>
</body></html>
