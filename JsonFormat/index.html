<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>JSON Formatter — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">{ }</span><span>JSON Formatter</span></a><div class="links"><a href="../">Home</a><button class="btn sm ghost" onclick="_openCmd()" style="font-family:var(--mono)">⌘K</button><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav>
<main class="wrap section"><section class="panel tool-page">
  <h1 class="section-title">JSON formatter &amp; validator</h1>
  <p class="section-sub mb">Paste JSON to validate, format, minify or analyze.</p>
  <div class="two">
    <div>
      <label>Input</label>
      <textarea id="input" rows="16" placeholder='{"name":"WorkSuite","version":3}' spellcheck="false" style="font-family:var(--mono);font-size:13px;tab-size:2"></textarea>
      <div class="toolbar mt"><button class="btn primary" id="format">Format</button><button class="btn" id="minify">Minify</button><button class="btn" id="validate">Validate</button><button class="btn" id="clear">Clear</button></div>
    </div>
    <div>
      <label>Output</label>
      <textarea id="output" rows="16" readonly spellcheck="false" style="font-family:var(--mono);font-size:13px;tab-size:2"></textarea>
      <div class="toolbar mt"><button class="btn" id="copy">Copy</button><button class="btn" id="download">Download .json</button></div>
    </div>
  </div>
  <div id="status" class="mt" style="font-size:13px"></div>
  <div class="stat-grid cols-4 mt">
    <div class="stat"><b id="keys">0</b><span>Keys</span></div>
    <div class="stat"><b id="depth">0</b><span>Max depth</span></div>
    <div class="stat"><b id="size">0</b><span>Bytes</span></div>
    <div class="stat"><b id="type">—</b><span>Root type</span></div>
  </div>
</section></main>
<script>
const $=s=>document.querySelector(s);
function count(o,d=0){let k=0,m=d;if(o&&typeof o==='object'){for(const[key,v] of Object.entries(o)){if(!Array.isArray(o))k++;const r=count(v,d+1);k+=r.k;m=Math.max(m,r.m)}}return{k,m}}
function analyze(t){try{const o=JSON.parse(t),{k,m}=count(o);$('#keys').textContent=k;$('#depth').textContent=m;$('#size').textContent=new Blob([t]).size;$('#type').textContent=Array.isArray(o)?'Array':typeof o==='object'&&o!==null?'Object':typeof o;return o}catch(e){$('#status').innerHTML=`<span style="color:var(--danger);font-weight:600">Error: ${e.message}</span>`;return null}}
$('#format').onclick=()=>{$('#status').innerHTML='';const o=analyze($('#input').value);if(o!==null){$('#output').value=JSON.stringify(o,null,2);$('#status').innerHTML='<span style="color:var(--ok);font-weight:600">Formatted with 2-space indent</span>'}};
$('#minify').onclick=()=>{$('#status').innerHTML='';const o=analyze($('#input').value);if(o!==null){const out=JSON.stringify(o);$('#output').value=out;const saved=new Blob([$('#input').value]).size-new Blob([out]).size;$('#status').innerHTML=`<span style="color:var(--ok);font-weight:600">Minified — saved ${saved} bytes</span>`}};
$('#validate').onclick=()=>{$('#status').innerHTML='';const o=analyze($('#input').value);if(o!==null){$('#output').value=JSON.stringify(o,null,2);$('#status').innerHTML='<span style="color:var(--ok);font-weight:600">Valid JSON</span>'}};
$('#clear').onclick=()=>{$('#input').value='';$('#output').value='';$('#status').innerHTML='';['keys','depth','size'].forEach(k=>$('#'+k).textContent='0');$('#type').textContent='—'};
$('#copy').onclick=()=>WorkSuite.copyText($('#output').value);
$('#download').onclick=()=>{const b=new Blob([$('#output').value||$('#input').value],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='data.json';a.click()};
</script>
</body></html>
