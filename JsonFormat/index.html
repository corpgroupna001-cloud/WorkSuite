<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>JSON Formatter — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin">
  <a class="logo" href="../"><span class="mark">{ }</span><span>JSON Formatter</span></a>
  <div class="links"><a href="../">Home</a><a href="../MarkdownPad/">Markdown</a>
    <button class="theme-toggle" data-theme-toggle>🌙</button>
  </div>
</div></nav>

<main class="wrap section">
  <section class="panel tool">
    <h1 class="title">JSON formatter &amp; validator</h1>
    <p class="muted mb">Paste JSON to validate, format, minify or compare. Runs entirely in your browser.</p>

    <div class="two">
      <div>
        <label>Input</label>
        <textarea id="input" rows="16" placeholder='{"name":"WorkSuite","version":2}' spellcheck="false" style="font-family:ui-monospace,monospace;font-size:13px;tab-size:2"></textarea>
        <div class="toolbar mt">
          <button class="btn primary" id="format">Format</button>
          <button class="btn" id="minify">Minify</button>
          <button class="btn" id="validate">Validate</button>
          <button class="btn" id="clear">Clear</button>
        </div>
      </div>
      <div>
        <label>Output</label>
        <textarea id="output" rows="16" readonly spellcheck="false" style="font-family:ui-monospace,monospace;font-size:13px;tab-size:2"></textarea>
        <div class="toolbar mt">
          <button class="btn" id="copy">Copy output</button>
          <button class="btn" id="download">Download .json</button>
        </div>
      </div>
    </div>

    <div id="status" class="mt"></div>

    <div class="statgrid mt">
      <div class="stat"><b id="keys">0</b><span>Keys</span></div>
      <div class="stat"><b id="depth">0</b><span>Max depth</span></div>
      <div class="stat"><b id="size">0</b><span>Bytes</span></div>
      <div class="stat"><b id="type">—</b><span>Root type</span></div>
    </div>
  </section>
</main>

<script>
const $=s=>document.querySelector(s);

function countKeys(obj,d=0){
  let keys=0,maxD=d;
  if(obj&&typeof obj==='object'){
    const entries=Array.isArray(obj)?obj.entries():Object.entries(obj);
    for(const [k,v] of entries){
      if(!Array.isArray(obj))keys++;
      const r=countKeys(v,d+1);
      keys+=r.keys;maxD=Math.max(maxD,r.maxD);
    }
  }
  return{keys,maxD};
}

function analyze(text){
  try{
    const obj=JSON.parse(text);
    const {keys,maxD}=countKeys(obj);
    $('#keys').textContent=keys;
    $('#depth').textContent=maxD;
    $('#size').textContent=new Blob([text]).size;
    $('#type').textContent=Array.isArray(obj)?'Array':typeof obj==='object'&&obj!==null?'Object':typeof obj;
    return obj;
  }catch(e){
    $('#status').innerHTML=`<span style="color:var(--danger);font-weight:700">Error: ${e.message}</span>`;
    return null;
  }
}

$('#format').onclick=()=>{
  $('#status').innerHTML='';
  const obj=analyze($('#input').value);
  if(obj!==null){
    const out=JSON.stringify(obj,null,2);
    $('#output').value=out;
    $('#status').innerHTML='<span style="color:var(--ok);font-weight:700">Valid JSON — formatted with 2-space indent</span>';
  }
};

$('#minify').onclick=()=>{
  $('#status').innerHTML='';
  const obj=analyze($('#input').value);
  if(obj!==null){
    const out=JSON.stringify(obj);
    $('#output').value=out;
    const saved=new Blob([$('#input').value]).size-new Blob([out]).size;
    $('#status').innerHTML=`<span style="color:var(--ok);font-weight:700">Minified — saved ${saved} bytes</span>`;
  }
};

$('#validate').onclick=()=>{
  $('#status').innerHTML='';
  const obj=analyze($('#input').value);
  if(obj!==null){
    $('#output').value=JSON.stringify(obj,null,2);
    $('#status').innerHTML='<span style="color:var(--ok);font-weight:700">Valid JSON</span>';
  }
};

$('#clear').onclick=()=>{$('#input').value='';$('#output').value='';$('#status').innerHTML='';['keys','depth','size'].forEach(k=>$('#'+k).textContent='0');$('#type').textContent='—'};
$('#copy').onclick=()=>WorkSuite.copyText($('#output').value);
$('#download').onclick=()=>{
  const blob=new Blob([$('#output').value||$('#input').value],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='data.json';a.click();
};
</script>
</body>
</html>
