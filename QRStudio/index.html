<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QR Studio — WorkSuite</title><link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script></head><body><nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">▦</span><span>QR Studio</span></a><div class="links"><a href="../">Home</a><a href="../FocusFlow/">FocusFlow</a><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav><main class="wrap section"><section class="panel tool"><h1 class="title">Real-time QR code generator</h1><div class="two"><div class="card"><label>URL, text, phone or email<textarea id="text" rows="6">https://work-suite-mauve.vercel.app</textarea></label><div class="formgrid"><label>Foreground<input id="fg" type="color" value="#11172c"></label><label>Background<input id="bg" type="color" value="#ffffff"></label></div><div class="toolbar"><button class="btn primary" id="download">Download PNG</button><button class="btn" id="clear">Clear</button></div></div><div class="qrbox"><div id="qr"></div><p class="mini">Live preview updates as you type.</p></div></div></section></main><script>const $=s=>document.querySelector(s);let qr;function make(){const text=$('#text').value||' ';$('#qr').innerHTML='';qr=new QRCode($('#qr'),{text,width:240,height:240,colorDark:$('#fg').value,colorLight:$('#bg').value,correctLevel:QRCode.CorrectLevel.H})}['text','fg','bg'].forEach(id=>$('#'+id).addEventListener('input',make));$('#download').onclick=()=>{const img=$('#qr img')||$('#qr canvas');let url=img.tagName==='IMG'?img.src:img.toDataURL('image/png');const a=document.createElement('a');a.href=url;a.download='worksuite-qr.png';a.click()};$('#clear').onclick=()=>{$('#text').value='';make()};make();</script></body></html>
