<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>WordCount Pro — WorkSuite</title><link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script></head><body><nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">¶</span><span>WordCount Pro</span></a><div class="links"><a href="../">Home</a><a href="../QRStudio/">QR Studio</a><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav><main class="wrap section"><section class="panel tool"><h1 class="title">Text intelligence in your browser</h1><textarea id="txt" rows="12" placeholder="Paste or write text here..."></textarea><div class="toolbar"><button class="btn" id="clear">Clear</button><button class="btn" id="copy">Copy text</button><button class="btn primary" id="export">Export stats .txt</button></div><div class="statgrid"><div class="stat"><b id="words">0</b><span>Words</span></div><div class="stat"><b id="chars">0</b><span>Characters</span></div><div class="stat"><b id="nospace">0</b><span>Chars without spaces</span></div><div class="stat"><b id="sent">0</b><span>Sentences</span></div><div class="stat"><b id="para">0</b><span>Paragraphs</span></div><div class="stat"><b id="read">0m</b><span>Reading time</span></div></div><h2>Keyword density</h2><table class="table"><thead><tr><th>Keyword</th><th>Count</th><th>Density</th></tr></thead><tbody id="dens"></tbody></table></section></main><script>const $=s=>document.querySelector(s),stop=new Set('the a an and or but to of in on for with is are was were be been being as at by from this that it its you your i we they he she his her them our not no do does did can could should would into about over under'.split(' '));function calc(){const t=$('#txt').value,words=(t.toLowerCase().match(/[a-z0-9']+/g)||[]),paras=t.trim()?t.trim().split(/\n\s*\n/).length:0,sent=(t.match(/[^.!?]+[.!?]+/g)||[]).length||(+!!t.trim());$('#words').textContent=words.length;$('#chars').textContent=t.length;$('#nospace').textContent=t.replace(/\s/g,'').length;$('#sent').textContent=sent;$('#para').textContent=paras;$('#read').textContent=Math.max(1,Math.ceil(words.length/200))+'m';const map={};words.filter(w=>w.length>2&&!stop.has(w)).forEach(w=>map[w]=(map[w]||0)+1);$('#dens').innerHTML=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,10).map(([w,c])=>`<tr><td>${w}</td><td>${c}</td><td>${words.length?((c/words.length)*100).toFixed(1):0}%</td></tr>`).join('')||'<tr><td colspan="3" class="muted">No keywords yet.</td></tr>'}$('#txt').oninput=calc;$('#clear').onclick=()=>{$('#txt').value='';calc()};$('#copy').onclick=async()=>{await navigator.clipboard.writeText($('#txt').value);$('#copy').textContent='Copied!';setTimeout(()=>$('#copy').textContent='Copy text',1200)};$('#export').onclick=()=>{calc();const summary=[...document.querySelectorAll('.stat')].map(s=>s.innerText.replace('\n',': ')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([summary+'\n\nTop keywords\n'+$('#dens').innerText],{type:'text/plain'}));a.download='wordcount-summary.txt';a.click()};calc();</script></body></html>
