<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WordCount Pro — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css">
  <script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin">
  <a class="logo" href="../"><span class="mark">¶</span><span>WordCount Pro</span></a>
  <div class="links">
    <a href="../">Home</a><a href="../MarkdownPad/">Markdown</a><a href="../NotePad/">Notes</a>
    <button class="theme-toggle" data-theme-toggle>🌙</button>
  </div>
</div></nav>

<main class="wrap section">
  <section class="panel tool">
    <h1 class="title">Text analysis</h1>
    <textarea id="txt" rows="10" placeholder="Paste or type text here..."></textarea>

    <div class="formgrid mt mb">
      <div style="display:flex;gap:8px">
        <input id="find" placeholder="Find..." style="flex:1">
        <input id="replace" placeholder="Replace with..." style="flex:1">
        <button class="btn" id="replaceBtn" style="white-space:nowrap">Replace all</button>
      </div>
    </div>

    <div class="toolbar">
      <button class="btn" id="clear">Clear</button>
      <button class="btn" id="copy">Copy text</button>
      <button class="btn" id="upper">UPPERCASE</button>
      <button class="btn" id="lower">lowercase</button>
      <button class="btn" id="titlecase">Title Case</button>
      <button class="btn primary" id="export">Export stats</button>
    </div>

    <div class="statgrid mt">
      <div class="stat"><b id="words">0</b><span>Words</span></div>
      <div class="stat"><b id="chars">0</b><span>Characters</span></div>
      <div class="stat"><b id="nospace">0</b><span>Without spaces</span></div>
      <div class="stat"><b id="sent">0</b><span>Sentences</span></div>
      <div class="stat"><b id="para">0</b><span>Paragraphs</span></div>
      <div class="stat"><b id="read">0m</b><span>Reading time</span></div>
      <div class="stat"><b id="speak">0m</b><span>Speaking time</span></div>
      <div class="stat"><b id="readability">—</b><span>Readability</span></div>
    </div>

    <h2 class="mt">Top keywords</h2>
    <table class="table">
      <thead><tr><th>Keyword</th><th>Count</th><th>Density</th></tr></thead>
      <tbody id="dens"></tbody>
    </table>
  </section>
</main>

<script>
const $ = s => document.querySelector(s);
const stop = new Set('the a an and or but to of in on for with is are was were be been being as at by from this that it its you your i we they he she his her them our not no do does did can could should would into about over under'.split(' '));

function fleschKincaid(text) {
  const words = (text.match(/[a-z0-9']+/gi) || []);
  const sents = (text.match(/[^.!?]+[.!?]+/g) || []).length || 1;
  if (words.length < 5) return null;
  let syllables = 0;
  words.forEach(w => {
    w = w.toLowerCase();
    let s = w.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/, '').match(/[aeiouy]{1,2}/g);
    syllables += (s ? s.length : 1);
  });
  const score = 206.835 - 1.015 * (words.length / sents) - 84.6 * (syllables / words.length);
  if (score >= 80) return 'Easy';
  if (score >= 60) return 'Standard';
  if (score >= 40) return 'Moderate';
  return 'Difficult';
}

function calc() {
  const t = $('#txt').value;
  const words = (t.toLowerCase().match(/[a-z0-9']+/g) || []);
  const paras = t.trim() ? t.trim().split(/\n\s*\n/).length : 0;
  const sent = (t.match(/[^.!?]+[.!?]+/g) || []).length || (+!!t.trim());

  $('#words').textContent = words.length;
  $('#chars').textContent = t.length;
  $('#nospace').textContent = t.replace(/\s/g, '').length;
  $('#sent').textContent = sent;
  $('#para').textContent = paras;
  $('#read').textContent = Math.max(1, Math.ceil(words.length / 200)) + 'm';
  $('#speak').textContent = Math.max(1, Math.ceil(words.length / 130)) + 'm';
  $('#readability').textContent = fleschKincaid(t) || '—';

  const map = {};
  words.filter(w => w.length > 2 && !stop.has(w)).forEach(w => map[w] = (map[w] || 0) + 1);
  $('#dens').innerHTML = Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 12)
    .map(([w, c]) => `<tr><td>${w}</td><td>${c}</td><td>${words.length ? ((c / words.length) * 100).toFixed(1) : 0}%</td></tr>`)
    .join('') || '<tr><td colspan="3" class="muted">Start typing to see keywords.</td></tr>';
}

$('#txt').oninput = calc;
$('#clear').onclick = () => { $('#txt').value = ''; calc(); };
$('#copy').onclick = () => { WorkSuite.copyText($('#txt').value); };
$('#upper').onclick = () => { $('#txt').value = $('#txt').value.toUpperCase(); calc(); };
$('#lower').onclick = () => { $('#txt').value = $('#txt').value.toLowerCase(); calc(); };
$('#titlecase').onclick = () => {
  $('#txt').value = $('#txt').value.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.slice(1).toLowerCase());
  calc();
};
$('#replaceBtn').onclick = () => {
  const f = $('#find').value;
  if (!f) return;
  $('#txt').value = $('#txt').value.split(f).join($('#replace').value);
  calc();
  WorkSuite.toast('Replaced all occurrences');
};
$('#export').onclick = () => {
  calc();
  const summary = [...document.querySelectorAll('.stat')].map(s => s.innerText.replace('\n', ': ')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([summary + '\n\nTop keywords\n' + $('#dens').innerText], { type: 'text/plain' }));
  a.download = 'wordcount-summary.txt'; a.click();
};
calc();
</script>
</body>
</html>
