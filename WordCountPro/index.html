<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WordCount Pro — WorkSuite</title>
  <link rel="stylesheet" href="../assets/styles.css"><script src="../assets/app.js"></script>
</head>
<body>
<nav class="nav"><div class="wrap navin"><a class="logo" href="../"><span class="mark">¶</span><span>WordCount Pro</span></a><div class="links"><a href="../">Home</a><a href="../MarkdownPad/">Markdown</a><button class="btn sm ghost" onclick="_openCmd()" style="font-family:var(--mono)">⌘K</button><button class="theme-toggle" data-theme-toggle>🌙</button></div></div></nav>
<main class="wrap section"><section class="panel tool-page">
  <h1 class="section-title">Text analysis</h1>
  <textarea id="txt" rows="10" placeholder="Paste or type text here..."></textarea>
  <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
    <input id="find" placeholder="Find..." style="flex:1;min-width:120px">
    <input id="replace" placeholder="Replace..." style="flex:1;min-width:120px">
    <button class="btn sm" id="replaceBtn">Replace all</button>
  </div>
  <div class="toolbar mt">
    <button class="btn sm" id="clear">Clear</button>
    <button class="btn sm" id="copy">Copy</button>
    <button class="btn sm" id="upper">UPPER</button>
    <button class="btn sm" id="lower">lower</button>
    <button class="btn sm" id="title">Title</button>
    <button class="btn sm primary" id="export">Export</button>
  </div>
  <div class="stat-grid cols-4 mt">
    <div class="stat"><b id="words">0</b><span>Words</span></div>
    <div class="stat"><b id="chars">0</b><span>Characters</span></div>
    <div class="stat"><b id="nospace">0</b><span>No spaces</span></div>
    <div class="stat"><b id="sent">0</b><span>Sentences</span></div>
    <div class="stat"><b id="para">0</b><span>Paragraphs</span></div>
    <div class="stat"><b id="read">0m</b><span>Read time</span></div>
    <div class="stat"><b id="speak">0m</b><span>Speak time</span></div>
    <div class="stat"><b id="readability">—</b><span>Readability</span></div>
  </div>
  <h2 class="section-title mt" style="font-size:18px">Top keywords</h2>
  <table class="table"><thead><tr><th>Keyword</th><th>Count</th><th>Density</th></tr></thead><tbody id="dens"></tbody></table>
</section></main>
<script>
const $=s=>document.querySelector(s);
const stop=new Set('the a an and or but to of in on for with is are was were be been being as at by from this that it its you your i we they he she his her them our not no do does did can could should would into about over under'.split(' '));
function fk(t){const w=(t.match(/[a-z0-9']+/gi)||[]),s=(t.match(/[^.!?]+[.!?]+/g)||[]).length||1;if(w.length<5)return null;let sy=0;w.forEach(x=>{x=x.toLowerCase();let m=x.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/,'').match(/[aeiouy]{1,2}/g);sy+=(m?m.length:1)});const sc=206.835-1.015*(w.length/s)-84.6*(sy/w.length);return sc>=80?'Easy':sc>=60?'Standard':sc>=40?'Moderate':'Difficult'}
function calc(){const t=$('#txt').value,words=(t.toLowerCase().match(/[a-z0-9']+/g)||[]),paras=t.trim()?t.trim().split(/\n\s*\n/).length:0,sent=(t.match(/[^.!?]+[.!?]+/g)||[]).length||(+!!t.trim());$('#words').textContent=words.length;$('#chars').textContent=t.length;$('#nospace').textContent=t.replace(/\s/g,'').length;$('#sent').textContent=sent;$('#para').textContent=paras;$('#read').textContent=Math.max(1,Math.ceil(words.length/200))+'m';$('#speak').textContent=Math.max(1,Math.ceil(words.length/130))+'m';$('#readability').textContent=fk(t)||'—';const map={};words.filter(w=>w.length>2&&!stop.has(w)).forEach(w=>map[w]=(map[w]||0)+1);$('#dens').innerHTML=Object.entries(map).sort((a,b)=>b[1]-a[1]).slice(0,12).map(([w,c])=>`<tr><td>${w}</td><td>${c}</td><td>${words.length?((c/words.length)*100).toFixed(1):0}%</td></tr>`).join('')||'<tr><td colspan="3" style="color:var(--text-tertiary)">Start typing to see keywords.</td></tr>'}
$('#txt').oninput=calc;$('#clear').onclick=()=>{$('#txt').value='';calc()};$('#copy').onclick=()=>WorkSuite.copyText($('#txt').value);$('#upper').onclick=()=>{$('#txt').value=$('#txt').value.toUpperCase();calc()};$('#lower').onclick=()=>{$('#txt').value=$('#txt').value.toLowerCase();calc()};$('#title').onclick=()=>{$('#txt').value=$('#txt').value.replace(/\w\S*/g,t=>t.charAt(0).toUpperCase()+t.slice(1).toLowerCase());calc()};$('#replaceBtn').onclick=()=>{const f=$('#find').value;if(!f)return;$('#txt').value=$('#txt').value.split(f).join($('#replace').value);calc();WorkSuite.toast('Replaced')};$('#export').onclick=()=>{calc();const s=[...document.querySelectorAll('.stat')].map(s=>s.innerText.replace('\n',': ')).join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([s+'\n\nKeywords\n'+$('#dens').innerText],{type:'text/plain'}));a.download='wordcount.txt';a.click()};calc();
</script>
</body></html>
